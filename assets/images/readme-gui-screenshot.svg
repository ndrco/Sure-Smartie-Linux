<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Sure Smartie GUI screenshot</title>
  <desc id="desc">Simplified screenshot of the Sure Smartie GUI showing custom glyph editing, screen configuration, LCD preview, and validation output.</desc>
